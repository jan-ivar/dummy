<!DOCTYPE html>
<html>
<button id="gum">gUM first</button>
<button id="go">Go!</button>
<body>Chat: <input id="chat" disabled><div id="div"></div>
<script>
const console = {log: msg => div.innerHTML += `${msg}<br>`};
const pc1 = new RTCPeerConnection(), pc2 = new RTCPeerConnection();
let stream;

gum.onclick = async () => {
  stream = await navigator.mediaDevices.getUserMedia({video: true});
};

go.onclick = () => {
  let i = 0;
  pc1.onicecandidate = ({candidate}) => {
    if (!candidate) return;
    console.log(`${++i}. candidate: ${candidate.address}`);
    pc2.addIceCandidate(candidate);
  }
  pc2.onicecandidate = e => pc1.addIceCandidate(e.candidate);
  pc1.oniceconnectionstatechange = e => console.log(pc1.iceConnectionState);
  pc1.onnegotiationneeded = async e => {
    await pc1.setLocalDescription();
    await pc2.setRemoteDescription(pc1.localDescription);
    await pc2.setLocalDescription();
    await pc1.setRemoteDescription(pc2.localDescription);
  };

  const channel = pc1.createDataChannel("chat");
  channel.onopen = () => chat.disabled = false;

  pc2.ondatachannel = ({channel}) => {
    channel.onopen = () => console.log("Chat!");
    channel.onmessage = ({data}) => console.log(`> ${data}`);
  };

  chat.onkeypress = ({keyCode}) => {
    if (keyCode != 13) return;
    channel.send(chat.value);
    chat.value = "";
  };
};
</script>
</body>
</html>
