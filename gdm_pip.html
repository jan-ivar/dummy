<html>
<meta charset=utf-8>
<button id="button">User gesture</button><br>
<div id="div"></div>
<video id="video2" autoplay></video><video id="video1" autoplay></video><br>
<canvas id="canvas"></canvas>
<script>
const console = {log: msg => div.innerHTML += `${msg}<br>`};

(async () => {
  try {
    video1.srcObject = await navigator.mediaDevices.getUserMedia({video: true});
    await new Promise(r => video1.onloadedmetadata = r);
  } catch (e) {
    console.log(e);
  }
})();

button.onclick = async () => {
  try {
    const p1 = navigator.mediaDevices.getDisplayMedia({video: true});
    const p2 = video1.requestPictureInPicture();
    video2.srcObject = await p1;
    await new Promise(r => video2.onloadedmetadata = r);
    const {label} = video2.srcObject.getVideoTracks()[0];
    console.log(`${label} (${video2.videoWidth} x ${video2.videoHeight})`);
    const pip = await p2;
    pip.onresize =  () => console.log("resizing pip");
  } catch (e) {
    console.log(e);
  }
}
</script>
</html>
