<html>
<meta charset=utf-8>
<div id="div"></div>
<video id="video" autoplay></video><br>
<script>
const console = {log: msg => div.innerHTML += `${msg}<br>`};

async function foo() {
  try {
    video.srcObject = await navigator.mediaDevices.getDisplayMedia({video: true});
    await new Promise(r => video.onloadedmetadata = r);
    const {label} = video.srcObject.getVideoTracks()[0];
    console.log(`${label} (${video.videoWidth} x ${video.videoHeight})`);
    await foo();
  } catch (e) {
    console.log(e);
    await foo();
  }
}
foo();
</script>
</html>
